name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: test ${{ matrix.python-version }} on ${{ matrix.os }}${{ matrix.experimental && ' (experimental)' || '' }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        # 3.14 enters as a best-effort row: native deps (onnxruntime, uvloop)
        # don't always have 3.14 wheels yet, so a failure here must not block
        # PR merges. Promote to the main matrix once wheels stabilize.
        include:
          - os: ubuntu-latest
            python-version: '3.14'
            experimental: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,serve]"

      - name: Run tests
        run: pytest --cov=supertonic --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Install through the [dev] extra so black/ruff versions match what
        # contributors see locally (pinned in pyproject.toml). A bare
        # `pip install black ruff` would float to whatever the latest is on
        # the runner that day, causing intermittent "would reformat" diffs.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting with Black
        run: black --check supertonic tests

      - name: Lint with Ruff
        run: ruff check supertonic tests
